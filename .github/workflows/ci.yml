name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile check
        run: |
          python3 -m py_compile brew_automator/*.py bin/brew-automator

      - name: Run tests
        run: |
          python3 -m unittest discover -s tests -v
